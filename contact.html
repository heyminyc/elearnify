<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact | E-Learnify</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>📑Elearnify</h1>
      <nav class="navbar">
        <ul>
          <li><a href="index.html" class="nav-links">Home</a></li>
          <li><a href="courses.html" class="nav-links">Courses</a></li>
          <li><a href="instructors.html" class="nav-links">Instructors</a></li>
          <li>
            <a href="testimonials.html" class="nav-links">Testimonials</a>
          </li>
          <li>
            <a href="contact.html" class="nav-links contact-link">Contact</a>
          </li>
        </ul>
      </nav>
      <a href="register.html" class="register-btn">Register</a>
    </header>
    <main>
      <h2 class="contact-heading">Contact Us</h2>

      <form class="contact-form" action="#" method="post">
        <label for="cname">Name</label>
        <input type="text" id="cname" name="cname" required />

        <label for="cemail">Email</label>
        <input type="email" id="cemail" name="cemail" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5"></textarea>

        <button type="submit">Send Message</button>
      </form>

      <section>
        <h2>Our Location</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d103734.58076655884!2d1.254743722205048!3d35.345265917192776!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1286d1cfd38bba5f%3A0x91801a2735466950!2sTiaret!5e1!3m2!1sen!2sdz!4v1767230642139!5m2!1sen!2sdz"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </section>
    </main>

    <footer>
      <p>Email: support@elearnify.com | Phone: +213 666 55 33 40</p>
    </footer>
  </body>
</html>
