<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register | E-Learnify</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>📑Elearnify</h1>
      <nav class="navbar">
        <ul>
          <li><a href="index.html" class="nav-links">Home</a></li>
          <li><a href="courses.html" class="nav-links">Courses</a></li>
          <li><a href="instructors.html" class="nav-links">Instructors</a></li>
          <li>
            <a href="testimonials.html" class="nav-links">Testimonials</a>
          </li>
          <li><a href="" class="nav-links">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="form-heading">Student Registration</h1>

      <section class="register-form">
        <form action="#" method="post">
          <fieldset>
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your full name"
              required
            />
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Your email"
              required
            />
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </fieldset>
          <fieldset>
            <label for="course">Select Course</label>
            <select id="course" name="course">
              <option>Web Development</option>
              <option>Python Programming</option>
              <option>Bash Scripting</option>
              <option>Cisco CCNA</option>
            </select>
          </fieldset>
          <label class="agree">
            <input type="checkbox" required /> I accept the terms and conditions
          </label>
          <button type="submit">Register</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 E-Learnify</p>
    </footer>
  </body>
</html>
